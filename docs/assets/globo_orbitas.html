<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Globo 3D de órbitas</title>
<style>
  html, body { margin: 0; height: 100%; background: #000010; overflow: hidden;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  #globe { width: 100%; height: 100%; }
  #legend { position: absolute; top: 10px; left: 10px; z-index: 10;
    background: rgba(10,12,20,.72); color: #e8e8e8; padding: 10px 12px;
    border-radius: 8px; font-size: 12px; line-height: 1.6; max-width: 230px; }
  #legend b { font-size: 12.5px; }
  .row { display: flex; align-items: center; gap: 7px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex: none; }
  #note { position: absolute; bottom: 8px; left: 10px; right: 10px; z-index: 10;
    color: #9aa3b2; font-size: 10.5px; text-align: center; }
  #status { position: absolute; top: 10px; right: 10px; z-index: 10;
    color: #9aa3b2; font-size: 10.5px; background: rgba(10,12,20,.6);
    padding: 3px 8px; border-radius: 6px; }
</style>
</head>
<body>
<div id="globe"></div>
<div id="legend">
  <b>Satélites reales en órbita</b><br/>
  <div id="legend-items"></div>
  <span style="color:#9aa3b2;font-size:10.5px">Arrastrá para girar · rueda para zoom · clic en un satélite = su traza terrestre</span>
</div>
<div id="status">cargando…</div>
<div id="note">Posiciones ilustrativas calculadas con SGP4 a partir de datos orbitales (TLE).
Las órbitas reales varían a diario.</div>

<script src="https://cdn.jsdelivr.net/npm/satellite.js@5.0.0/dist/satellite.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/globe.gl@2.32.0/dist/globe.gl.min.js"></script>
<script>
const EARTH_R_KM = 6371;

// --- Satélites curados. Snapshot TLE embebido como respaldo; se intenta
//     refrescar en vivo desde Celestrak por número de catálogo (CATNR). ---
const SATS = [
  { name: "ISS",         catnr: 25544, group: "LEO",
    color: "#ffd166",
    tle1: "1 25544U 98067A   26165.09325830  .00008623  00000+0  16324-3 0  9997",
    tle2: "2 25544  51.6335 315.4063 0004936 183.6835 176.4118 15.49219019571274" },
  { name: "Sentinel-1A", catnr: 39634, group: "SSO",
    color: "#ef476f",
    tle1: "1 39634U 14016A   26165.21321079 -.00000479  00000+0 -91822-4 0  9999",
    tle2: "2 39634  98.1775 172.7892 0001415  82.5971 277.5389 14.59198047649584" },
  { name: "Sentinel-2A", catnr: 40697, group: "SSO",
    color: "#06d6a0",
    tle1: "1 40697U 15028A   26165.20769247 -.00000152  00000+0 -41298-4 0  9996",
    tle2: "2 40697  98.5689 240.1014 0001096  91.2008 268.9300 14.30813743573301" },
  { name: "Landsat 9",   catnr: 49260, group: "SSO",
    color: "#118ab2",
    tle1: "1 49260U 21088A   26165.17503140  .00000288  00000+0  74138-4 0  9995",
    tle2: "2 49260  98.2281 235.3889 0001428  85.5211 274.6150 14.57095086250566" },
  { name: "SAOCOM 1A",   catnr: 43641, group: "SSO",
    color: "#9b5de5",
    tle1: "1 43641U 18076A   26165.16555760  .00000627  00000+0  85294-4 0  9991",
    tle2: "2 43641  97.8880 351.9586 0001613  77.9750 282.1644 14.82147898415653" },
  { name: "GOES-18 (GEO)", catnr: 51850, group: "GEO",
    color: "#f4a261",
    tle1: "1 51850U 22021A   26165.15600350  .00000105  00000+0  00000+0 0  9990",
    tle2: "2 51850   0.0208 162.0083 0000466   5.3663  14.2477  1.00272156  6566" },
];

// --- Leyenda ---
const legend = document.getElementById("legend-items");
SATS.forEach(s => {
  const r = document.createElement("div");
  r.className = "row";
  r.innerHTML = `<span class="dot" style="background:${s.color}"></span>${s.name} <span style="color:#9aa3b2">· ${s.group}</span>`;
  legend.appendChild(r);
});

// --- Intentar refrescar TLE en vivo (Celestrak soporta CORS). Si falla, snapshot. ---
async function refreshTLE() {
  const status = document.getElementById("status");
  let ok = 0;
  await Promise.allSettled(SATS.map(async s => {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 8000);
      const url = `https://celestrak.org/NORAD/elements/gp.php?CATNR=${s.catnr}&FORMAT=tle`;
      const resp = await fetch(url, { signal: ctrl.signal });
      clearTimeout(t);
      const txt = (await resp.text()).trim();
      const lines = txt.split(/\r?\n/).map(l => l.trim());
      const l1 = lines.find(l => l.startsWith("1 "));
      const l2 = lines.find(l => l.startsWith("2 "));
      if (l1 && l2) { s.tle1 = l1; s.tle2 = l2; ok++; }
    } catch (e) { /* fallback al snapshot embebido */ }
  }));
  status.textContent = ok === SATS.length ? "TLE en vivo (Celestrak)"
    : ok > 0 ? `TLE en vivo: ${ok}/${SATS.length} · resto snapshot`
    : "TLE: snapshot embebido (sin red)";
  setTimeout(() => { status.style.opacity = .0; }, 6000);
  status.style.transition = "opacity 1.5s";
}

// --- Globo ---
const world = Globe()
  (document.getElementById("globe"))
  .globeImageUrl("https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg")
  .bumpImageUrl("https://unpkg.com/three-globe/example/img/earth-topology.png")
  .backgroundImageUrl("https://unpkg.com/three-globe/example/img/night-sky.png")
  .objectLat("lat").objectLng("lng").objectAltitude("alt")
  .objectLabel(d => `${d.name} — ${d.group}\n${Math.round(d.altKm)} km`)
  .objectThreeObject(d => {
    const geom = new THREE.SphereGeometry(d.group === "GEO" ? 1.6 : 1.1, 12, 12);
    const mat = new THREE.MeshLambertMaterial({ color: d.color, emissive: d.color, emissiveIntensity: .6 });
    return new THREE.Mesh(geom, mat);
  })
  .onObjectClick(d => showGroundTrack(d))
  .pathColor(() => ["rgba(255,255,255,0.1)", "rgba(255,255,255,0.85)"])
  .pathPointAlt(0.002)
  .pathStroke(1.5)
  .pathTransitionDuration(0);

world.controls().autoRotate = false;
world.pointOfView({ altitude: 3.2 });

// --- Propagación SGP4 ---
function initSatrecs() {
  SATS.forEach(s => {
    try { s.satrec = satellite.twoline2satrec(s.tle1, s.tle2); }
    catch (e) { s.satrec = null; }
  });
}

function geodeticAt(satrec, date) {
  const pv = satellite.propagate(satrec, date);
  if (!pv.position) return null;
  const gmst = satellite.gstime(date);
  const gd = satellite.eciToGeodetic(pv.position, gmst);
  return {
    lat: satellite.degreesLat(gd.latitude),
    lng: satellite.degreesLong(gd.longitude),
    altKm: gd.height,
  };
}

// --- Traza terrestre al hacer clic (una órbita aprox.) ---
function showGroundTrack(d) {
  if (!d.satrec) return;
  const periodMin = (2 * Math.PI) / d.satrec.no; // no = mean motion (rad/min)
  const steps = 120;
  const pts = [];
  for (let i = 0; i <= steps; i++) {
    const t = new Date(simTime.getTime() + (i / steps) * periodMin * 60 * 1000);
    const g = geodeticAt(d.satrec, t);
    if (g) pts.push([g.lat, g.lng]);
  }
  world.pathsData([pts]);
}

// --- Reloj simulado (acelerado para que el movimiento sea visible) ---
const SPEED = 45;
let simTime = new Date();
let lastReal = performance.now();

function frame() {
  const now = performance.now();
  simTime = new Date(simTime.getTime() + (now - lastReal) * SPEED);
  lastReal = now;

  SATS.forEach(s => {
    if (!s.satrec) return;
    const g = geodeticAt(s.satrec, simTime);
    if (!g) return;
    s.lat = g.lat; s.lng = g.lng; s.altKm = g.altKm;
    s.alt = g.altKm / EARTH_R_KM;
  });
  world.objectsData(SATS.filter(s => s.satrec && s.lat !== undefined));
  requestAnimationFrame(frame);
}

// --- Arranque ---
initSatrecs();           // dibuja ya con el snapshot
requestAnimationFrame(frame);
refreshTLE().then(initSatrecs); // refresca a TLE en vivo si hay red

addEventListener("resize", () => {
  world.width(window.innerWidth).height(window.innerHeight);
});
</script>
</body>
</html>
